name: Deploy to Prod

on:
  push:
    branches:
      - main

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/var/www/main_bbe
            BACKUP_DIR=/var/backups/main_bbe
            SERVICE_NAME=main_bbe.service

            PYTHON="$APP_DIR/.venv/bin/python"
            ALEMBIC="$APP_DIR/.venv/bin/alembic"
            DATABASE="$APP_DIR/bbe.db"

            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR" || true

            echo "Fetching application code..."
            git fetch --prune origin
            git reset --hard origin/main

            echo "Ensuring virtual environment exists..."
            if [ ! -x "$PYTHON" ]; then
              python3 -m venv "$APP_DIR/.venv"
            fi

            echo "Installing dependencies..."
            "$PYTHON" -m pip install --upgrade pip setuptools wheel
            "$PYTHON" -m pip install -r "$APP_DIR/requirements.txt"

            echo "Preparing database migration..."
            sudo mkdir -p "$BACKUP_DIR"
            sudo chown "$(id -un):$(id -gn)" "$BACKUP_DIR"

            SERVICE_STOPPED=false

            restart_on_failure() {
              exit_code=$?

              if [ "$exit_code" -ne 0 ] && [ "$SERVICE_STOPPED" = true ]; then
                echo "Deployment failed; attempting to restart application..."
                sudo systemctl start "$SERVICE_NAME" || true
              fi

              exit "$exit_code"
            }

            trap restart_on_failure EXIT

            echo "Stopping application..."
            sudo systemctl stop "$SERVICE_NAME"
            SERVICE_STOPPED=true

            if [ -f "$DATABASE" ]; then
              BACKUP_FILE="$BACKUP_DIR/bbe-$(date -u +%Y%m%d-%H%M%S).db"

              echo "Backing up database to $BACKUP_FILE..."
              sqlite3 "$DATABASE" ".backup '$BACKUP_FILE'"
            fi

            echo "Running database migrations..."
            "$ALEMBIC" upgrade head

            echo "Starting application..."
            sudo systemctl start "$SERVICE_NAME"
            SERVICE_STOPPED=false

            echo "Checking application service..."
            sudo systemctl is-active --quiet "$SERVICE_NAME"

            echo "Checking nginx configuration..."
            sudo nginx -t
            sudo systemctl reload nginx

            echo "Removing database backups older than 14 days..."
            find "$BACKUP_DIR" \
              -type f \
              -name 'bbe-*.db' \
              -mtime +14 \
              -delete

            trap - EXIT

            echo "✅ deployed $(git rev-parse --short HEAD)"