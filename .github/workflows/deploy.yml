name: Deploy to Prod

on:
  push:
    branches: ["main"]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /var/www/main_bbe

            git config --global --add safe.directory /var/www/main_bbe || true

            git fetch origin
            git reset --hard origin/main

            if [ ! -x /var/www/main_bbe/.venv/bin/python ]; then
              python3 -m venv /var/www/main_bbe/.venv
            fi

            /var/www/main_bbe/.venv/bin/python -m pip install --upgrade pip setuptools wheel

            if [ -f /var/www/main_bbe/requirements.txt ]; then
              /var/www/main_bbe/.venv/bin/python -m pip install -r /var/www/main_bbe/requirements.txt
            fi

            sudo systemctl restart main_bbe
            sudo systemctl reload nginx

            echo "✅ deployed $(git rev-parse --short HEAD)"