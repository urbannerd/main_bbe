name: Deploy to Prod

on:
  push:
    branches:
      - main

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/var/www/main_bbe
            SERVICE_NAME=main_bbe.service
            PYTHON="$APP_DIR/.venv/bin/python"
            ALEMBIC="$APP_DIR/.venv/bin/alembic"

            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR" || true

            echo "Fetching application code..."
            git fetch origin
            git reset --hard origin/main

            echo "Ensuring virtual environment exists..."
            if [ ! -x "$PYTHON" ]; then
              python3 -m venv "$APP_DIR/.venv"
            fi

            echo "Installing dependencies..."
            "$PYTHON" -m pip install --upgrade pip setuptools wheel
            "$PYTHON" -m pip install -r "$APP_DIR/requirements.txt"

            echo "Backing up database..."
            if [ -f "$APP_DIR/bbe.db" ]; then
              cp "$APP_DIR/bbe.db" \
                "$APP_DIR/bbe.db.backup-$(date +%Y%m%d-%H%M%S)"
            fi

            echo "Running database migrations..."
            "$ALEMBIC" upgrade head

            echo "Restarting application..."
            sudo systemctl restart "$SERVICE_NAME"

            echo "Checking application service..."
            sudo systemctl is-active --quiet "$SERVICE_NAME"

            echo "Reloading nginx..."
            sudo nginx -t
            sudo systemctl reload nginx

            echo "✅ deployed $(git rev-parse --short HEAD)"