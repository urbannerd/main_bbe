name: Deploy to Prod

on:
  push:
    branches: ["main"]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/impulse

            git config --global --add safe.directory /opt/impulse || true

            git fetch origin
            git reset --hard origin/main

            # Ensure venv exists (self-heal)
            if [ ! -x /opt/impulse/.venv/bin/python ]; then
              python3 -m venv /opt/impulse/.venv
            fi

            /opt/impulse/.venv/bin/python -m pip install --upgrade pip setuptools wheel

            if [ -f /opt/impulse/requirements.txt ]; then
              /opt/impulse/.venv/bin/python -m pip install -r /opt/impulse/requirements.txt
            fi

            sudo systemctl restart impulse-api.service
            sudo systemctl reload nginx

            echo "✅ deployed $(git rev-parse --short HEAD)"