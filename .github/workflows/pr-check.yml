name: PR Check

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./pr-check.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify application imports
        run: |
          python -c "from app.main import app; print('Application import succeeded')"

      - name: Verify one Alembic head
        run: |
          HEAD_COUNT="$(alembic heads | grep -c '(head)')"

          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "Expected exactly one Alembic head, found $HEAD_COUNT"
            alembic heads
            exit 1
          fi

      - name: Build database from migrations
        run: |
          rm -f pr-check.db
          alembic upgrade head

      - name: Verify schema matches models
        run: |
          alembic current
          alembic check

      - name: Test downgrade and rebuild
        run: |
          alembic downgrade base
          alembic upgrade head
          alembic check

      - name: Require migration when models change
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA"...HEAD)"

          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^app/models(\.py|/)'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^migrations/versions/.*\.py$'; then
              echo "SQLAlchemy models changed, but no Alembic migration was added."
              exit 1
            fi
          fi